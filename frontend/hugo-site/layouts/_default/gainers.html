{{ define "main" }}
<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem">
  <h1 style="font-size:1.4rem;font-weight:700">🟢 Top Gainers</h1>
  <span id="gainer-count" style="font-size:.8rem;color:var(--text3)"></span>
  <select id="gainer-limit" style="margin-left:auto;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:.3rem .6rem;font-size:.8rem">
    <option value="25">Top 25</option>
    <option value="50" selected>Top 50</option>
    <option value="100">Top 100</option>
  </select>
</div>

<div class="panel">
  <div class="table-wrap" id="gainers-table">
    <div class="skeleton" style="height:400px;border-radius:6px"></div>
  </div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
const COLS = [
  { key: 'symbol',                           label: 'Symbol',    fmt: v => v },
  { key: 'current_stock_price',              label: 'Price',     fmt: YSF.fmt.price },
  { key: 'performance_today',                label: '% Today',   fmt: YSF.fmt.pct,  pct: true },
  { key: 'performance_week',                 label: '% Week',    fmt: YSF.fmt.pct,  pct: true },
  { key: 'volume',                           label: 'Volume',    fmt: YSF.fmt.vol },
  { key: 'relative_volume',                  label: 'Rel Vol',   fmt: v => v ? parseFloat(v).toFixed(2)+'x' : '—' },
  { key: 'market_capitalization',            label: 'Mkt Cap',   fmt: YSF.fmt.mcap },
  { key: 'price_to_earnings_ttm',            label: 'P/E',       fmt: v => v ? parseFloat(v).toFixed(1) : '—' },
  { key: 'relative_strength_index_14',       label: 'RSI',       fmt: v => v ? parseFloat(v).toFixed(1) : '—' },
];

async function load() {
  const limit = parseInt(document.getElementById('gainer-limit').value);
  YSF.setLoading('gainers-table', true);
  showRefreshPulse();
  try {
    const { data, total } = await YSF.stocks.gainers(limit);
    YSF.renderTable('gainers-table', data, COLS);
    document.getElementById('gainer-count').textContent =
      `${data.length} stocks — as of ${data[0]?.time_recorded ? new Date(data[0].time_recorded).toLocaleString() : 'recent'}`;
  } catch(err) {
    YSF.showError('gainers-table', err.message);
  }
  YSF.setLoading('gainers-table', false);
}

document.getElementById('gainer-limit').addEventListener('change', load);
load();
setInterval(() => { load(); }, window.YSF_CONFIG.refreshMs);
</script>
{{ end }}
