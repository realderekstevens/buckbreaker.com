baseURL  = "https://yourstockforecast.com"
title    = "YourStockForecast"

# ─────────────────────────────────────────────────────────────────────────────
# MULTILINGUAL
# ─────────────────────────────────────────────────────────────────────────────
defaultContentLanguage         = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageName = "English"
    weight       = 1

  [languages.es]
    languageName = "Español"
    weight       = 2
    contentDir   = "content.es"

  [languages.zh]
    languageName = "中文"
    weight       = 3
    contentDir   = "content.zh"

# ─────────────────────────────────────────────────────────────────────────────
# HUGO MODULES
# NOTE: module.mounts.lang is deprecated since v0.153 but still functional.
# The replacement (sites.matrix) does not yet reliably support content-dir
# merging for third-party themes. Leave as-is until Hugo stabilises the API.
# ─────────────────────────────────────────────────────────────────────────────
[module]

  [[module.imports]]
    path = "github.com/alex-shpak/hugo-book"

  # English: merge content/ (stock pages) + content.en/ (newspaper archive)
  [[module.mounts]]
    source = "content"
    target = "content"
    lang   = "en"

  [[module.mounts]]
    source = "content.en"
    target = "content"
    lang   = "en"

  # Spanish & Chinese
  [[module.mounts]]
    source = "content.es"
    target = "content"
    lang   = "es"

  [[module.mounts]]
    source = "content.zh"
    target = "content"
    lang   = "zh"

  # Standard asset mounts (required when any custom mount is declared)
  [[module.mounts]]
    source = "assets"
    target = "assets"

  [[module.mounts]]
    source = "static"
    target = "static"

  [[module.mounts]]
    source = "layouts"
    target = "layouts"

  [[module.mounts]]
    source = "data"
    target = "data"

  [[module.mounts]]
    source = "i18n"
    target = "i18n"

  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"

# ─────────────────────────────────────────────────────────────────────────────
# PAGINATION
# ─────────────────────────────────────────────────────────────────────────────
[pagination]
  pagerSize = 50

# ─────────────────────────────────────────────────────────────────────────────
# TAXONOMIES
# ─────────────────────────────────────────────────────────────────────────────
[taxonomies]
  sector   = "sectors"
  exchange = "exchanges"

# ─────────────────────────────────────────────────────────────────────────────
# BUILD
# ─────────────────────────────────────────────────────────────────────────────
[build]
  writeStats = true

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUT FORMATS — JSON removed from section to eliminate layout warnings
# ─────────────────────────────────────────────────────────────────────────────
[outputs]
  home    = ["HTML", "JSON"]
  section = ["HTML"]
  page    = ["HTML"]

# ─────────────────────────────────────────────────────────────────────────────
# PARAMS
# ─────────────────────────────────────────────────────────────────────────────
[params]

  # ── hugo-book theme settings ──────────────────────────────────────────────
  BookTheme            = "light"
  BookToC              = true
  BookFlatSection      = false
  BookSearch           = true
  BookComments         = false
  BookPortableLinks    = false
  BookRepo             = "https://github.com/realderekstevens/YourStockForecast"
  BookEditPath         = "edit/main/frontend/hugo-site/content"
  BookMenuFromSections = false
  BookSectionPagesMenu = "main"

  # ── SEO ───────────────────────────────────────────────────────────────────
  description    = "Free real-time stock data, fundamental analysis, and screening tools powered by Finviz data."
  og_image       = "/img/og-card.png"
  twitter_handle = "@YourStockForecast"
  site_version   = "1.0.0"

  # ── PostgREST API endpoints ───────────────────────────────────────────────
  api_base  = "http://localhost:3000"
  api_prod  = "https://api.yourstockforecast.com"

  # ── JS polling / display ──────────────────────────────────────────────────
  refresh_ms = 60000
  max_rows   = 100

  # ── Feature flags ─────────────────────────────────────────────────────────
  show_login    = true
  show_screener = true
  show_gainers  = true
  show_losers   = true
