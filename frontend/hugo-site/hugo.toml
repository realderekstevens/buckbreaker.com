baseURL  = "https://yourstockforecast.com"
title    = "YourStockForecast"

# theme = "hugo-book"   # ← uncomment if using git submodule instead of Hugo Modules

# ─────────────────────────────────────────────────────────────────────────────
# MULTILINGUAL
# The English language merges two source dirs:
#   content/     → stock/market/screener pages
#   content.en/  → newspaper archive articles
# We do this by pointing contentDir at a single merged dir — see module.mounts.
# ─────────────────────────────────────────────────────────────────────────────
defaultContentLanguage         = "en"
defaultContentLanguageInSubdir = false

[languages]

  [languages.en]
    languageName = "English"
    weight       = 1
    # contentDir is NOT set here — module.mounts below feeds both dirs into "content"

  [languages.es]
    languageName = "Español"
    weight       = 2
    contentDir   = "content.es"

  [languages.zh]
    languageName = "中文"
    weight       = 3
    contentDir   = "content.zh"

# ─────────────────────────────────────────────────────────────────────────────
# HUGO MODULES
# Both content/ and content.en/ are mounted to the same target "content"
# for the English language. Hugo merges them at build time.
# The `lang` key is deprecated since v0.153 but remains functional.
# The replacement (sites.matrix) does not yet support content-dir merging
# reliably with third-party themes — use module.mounts until it stabilises.
# ─────────────────────────────────────────────────────────────────────────────
[module]

  [[module.imports]]
    path = "github.com/alex-shpak/hugo-book"

  # ── English content — two dirs merged into one ────────────────────────────
  [[module.mounts]]
    source = "content"
    target = "content"
    lang   = "en"

  [[module.mounts]]
    source = "content.en"
    target = "content"
    lang   = "en"

  # ── Spanish & Chinese content ─────────────────────────────────────────────
  [[module.mounts]]
    source = "content.es"
    target = "content"
    lang   = "es"

  [[module.mounts]]
    source = "content.zh"
    target = "content"
    lang   = "zh"

  # ── Standard asset mounts (required when any custom mount is declared) ────
  [[module.mounts]]
    source = "assets"
    target = "assets"

  [[module.mounts]]
    source = "static"
    target = "static"

  [[module.mounts]]
    source = "layouts"
    target = "layouts"

  [[module.mounts]]
    source = "data"
    target = "data"

  [[module.mounts]]
    source = "i18n"
    target = "i18n"

  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"

# ─────────────────────────────────────────────────────────────────────────────
# PAGINATION
# ─────────────────────────────────────────────────────────────────────────────
[pagination]
  pagerSize = 50

# ─────────────────────────────────────────────────────────────────────────────
# TAXONOMIES
# ─────────────────────────────────────────────────────────────────────────────
[taxonomies]
  sector   = "sectors"
  exchange = "exchanges"

# ─────────────────────────────────────────────────────────────────────────────
# BUILD
# ─────────────────────────────────────────────────────────────────────────────
[build]
  writeStats = true

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUT FORMATS
# ─────────────────────────────────────────────────────────────────────────────
[outputs]
  home    = ["HTML", "JSON"]
  section = ["HTML", "JSON"]
  page    = ["HTML"]

# ─────────────────────────────────────────────────────────────────────────────
# PARAMS
# ─────────────────────────────────────────────────────────────────────────────
[params]

  # ── hugo-book theme settings ──────────────────────────────────────────────
  BookTheme            = "auto"
  BookToC              = true
  BookFlatSection      = false
  BookSearch           = true
  BookComments         = false
  BookPortableLinks    = false
  BookRepo             = "https://github.com/realderekstevens/YourStockForecast"
  BookEditPath         = "edit/main/frontend/hugo-site/content"
  BookMenuFromSections = false
  BookSectionPagesMenu = "main"

  # ── SEO ───────────────────────────────────────────────────────────────────
  description    = "Free real-time stock data, fundamental analysis, and screening tools powered by Finviz data."
  og_image       = "/img/og-card.png"
  twitter_handle = "@YourStockForecast"
  site_version   = "1.0.0"

  # ── PostgREST API endpoints ───────────────────────────────────────────────
  api_base  = "http://localhost:3000"
  api_prod  = "https://api.yourstockforecast.com"

  # ── JS polling / display ──────────────────────────────────────────────────
  refresh_ms = 60000
  max_rows   = 100

  # ── Feature flags ─────────────────────────────────────────────────────────
  show_login    = true
  show_screener = true
  show_gainers  = true
  show_losers   = true
