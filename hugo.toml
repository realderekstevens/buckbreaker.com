# =============================================================================
# YourStockForecast — Hugo Configuration
# Place this file at: frontend/hugo-site/hugo.toml
#
# REQUIREMENTS:
#   - Hugo extended edition (v0.110+)  →  `hugo version` must show "+extended"
#   - Theme installed as submodule     →  themes/book/ must NOT be empty
#     Run: git submodule update --init --recursive
# =============================================================================

baseURL  = "https://yourstockforecast.com/"
title    = "YourStockForecast"
theme    = "book"
BookEditPath = "edit/main/frontend/hugo-site/content.en"

# Content language
locale                 = "en-US"
defaultContentLanguage = "en"
contentDir             = "content.en"

# Disable Hugo's default summary truncation
summaryLength = 70

# Allow HTML inside Markdown (needed for some hugo-book shortcodes)
[markup.goldmark.renderer]
  unsafe = true

# Syntax highlighting
[markup.highlight]
  style = "monokai"

# =============================================================================
# hugo-book theme parameters
# Full reference: https://github.com/alex-shpak/hugo-book#configuration
# =============================================================================
[params]

  # Render pages from this content section as the left sidebar menu.
  # Your Markdown files should live in: content/docs/
  BookSection = "*"

  # Enable the sidebar menu defined in content/menu/index.md
  # Set to "/menu" to activate — comment out to use automatic section menu
  # BookMenuBundle = "/menu"

  # Show table of contents on each page (generated from ## headings)
  BookToC = true

  # Enable built-in full-text search (no extra setup needed)
  BookSearch = true

  # Theme toggle: "auto" respects the reader's OS preference
  # Options: "auto" | "light" | "dark"
  BookTheme = "auto"

  # Show page-level git commit info (author, date) — requires git history
  # Disable this if you get "Failed to read Git log" errors on a fresh repo
  BookGitRepository = "https://github.com/realderekstevens/YourStockForecast"
  BookCommitPath    = "commit"

  # Landing page path — where the logo/title in the top-left links to
  BookLogo = ""

  # Optional: override the default "Edit this page" link
  # BookEditPath = "edit/main"

  # Set to true to collapse all menu sections by default
  BookCollapseSection = false

  # Show word count and reading time on each page
  BookPortableLinks = false

# =============================================================================
# Navigation menu — shown in the top bar
# Items here appear as links across the top of every page
# =============================================================================
[[menu.after]]
  name   = "GitHub"
  url    = "https://github.com/realderekstevens/YourStockForecast"
  weight = 10

[[menu.after]]
  name   = "YourStockForecast.com"
  url    = "https://yourstockforecast.com"
  weight = 20

# =============================================================================
# Build settings
# =============================================================================
[build]
  # Suppress "Page not found" warnings for draft content
  noJSConfigInAssets = false

[minify]
  # Minify HTML/CSS/JS when running `hugo --minify`
  minifyOutput = true
