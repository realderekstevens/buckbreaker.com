# /etc/nginx/sites-available/yourstockforecast.com
# ─────────────────────────────────────────────────────────────────────────────
# YourStockForecast — Nginx config
#
# Setup on VPS:
#   sudo cp nginx/yourstockforecast.conf /etc/nginx/sites-available/yourstockforecast.com
#   sudo ln -s /etc/nginx/sites-available/yourstockforecast.com \
#              /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d yourstockforecast.com -d www.yourstockforecast.com \
#                        -d api.yourstockforecast.com
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# ── Redirect www → bare domain ────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name www.yourstockforecast.com;
    return 301 https://yourstockforecast.com$request_uri;
}

# ── Main site (Hugo static files) ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourstockforecast.com www.yourstockforecast.com;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/yourstockforecast.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourstockforecast.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/yourstockforecast;
    index index.html;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' fonts.googleapis.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com fonts.gstatic.com; font-src fonts.gstatic.com; connect-src 'self' https://api.yourstockforecast.com;" always;

    # Cache static assets aggressively
    location ~* \.(css|js|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }

    # HTML — short cache (data is always fresh)
    location ~* \.html$ {
        expires     5m;
        add_header  Cache-Control "public, must-revalidate";
    }

    # Hugo clean URLs
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # Custom 404 page
    error_page 404 /404.html;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript application/json
                      application/xml+rss image/svg+xml;
}

# ── PostgREST API (proxied at api.yourstockforecast.com) ──────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.yourstockforecast.com;

    ssl_certificate     /etc/letsencrypt/live/yourstockforecast.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourstockforecast.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    # CORS — allow your Hugo site and localhost dev
    add_header Access-Control-Allow-Origin  "https://yourstockforecast.com, http://localhost:1313" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS"                    always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Prefer, Accept"          always;
    add_header Access-Control-Expose-Headers "Content-Range, Range-Unit"                           always;

    # Preflight
    if ($request_method = OPTIONS) {
        add_header Content-Length 0;
        add_header Content-Type  "text/plain";
        return 204;
    }

    # Rate limiting — protect PostgREST from abuse
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req      zone=api burst=60 nodelay;
    limit_req_status 429;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeouts for heavy screener queries
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}
